<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro — Academia Ge Ribeiro</title>
    <link rel="icon" href="assets/branding/geribeiro/geribeiro.png" type="image/png" sizes="any" />
    <link rel="apple-touch-icon" href="assets/branding/geribeiro/geribeiro.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="assets/css/theme-auth.css" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center py-4 auth-wrap"
    >
      <div class="w-100" style="max-width: 520px">
        <div class="auth-brand">
          <a href="index.html">
            <img src="assets/branding/geribeiro/geribeiro.png" alt="Academia Ge Ribeiro" />
          </a>
          <div class="auth-brand-title">Academia Ge Ribeiro</div>
        </div>
        <form id="form" class="card auth-card register-wide mx-auto shadow-none">
          <div class="card-body p-4">
            <h1 class="h3 text-center mb-1">Criar conta de aluno</h1>
            <p class="text-center text-secondary small mb-4">
              Seu cadastro ficará pendente até a aprovação da gestão da academia.
            </p>
            <div id="alert" class="alert d-none" role="alert"></div>

            <!-- Uma academia: vínculo silencioso (marca já aparece no topo). Várias: select abaixo. -->
            <input type="hidden" id="gym_id_fixed" value="" />

            <!-- Várias academias (ex.: ambiente de testes): mantém seleção -->
            <div id="gymMultipleWrap" class="mb-3 d-none">
              <label class="form-label" for="gym_select">Academia</label>
              <select class="form-select" id="gym_select"></select>
            </div>

            <div class="mb-3">
              <label class="form-label" for="email">E-mail</label>
              <input class="form-control" type="email" id="email" required autocomplete="username" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Senha (mín. 6 caracteres)</label>
              <input
                class="form-control"
                type="password"
                id="password"
                minlength="6"
                required
                autocomplete="new-password"
              />
            </div>
            <button type="submit" class="btn btn-auth-primary w-100" id="btnSubmit" disabled>
              Enviar cadastro
            </button>
            <p class="text-center text-secondary mt-3 mb-0 small">
              Já possui conta?
              <a href="login.html" class="text-decoration-none fw-semibold">Entrar</a>
            </p>
          </div>
        </form>
        <p class="text-center mt-3 mb-0">
          <a href="index.html" class="text-decoration-none auth-back-link small">Voltar ao início</a>
        </p>
      </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script>
      const alertEl = document.getElementById('alert');
      const gymMultipleWrap = document.getElementById('gymMultipleWrap');
      const gymIdFixed = document.getElementById('gym_id_fixed');
      const gymSelect = document.getElementById('gym_select');

      function showLoadError(msg) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      async function setupGyms() {
        try {
          const data = await apiJson('/gyms');
          const gyms = data.gyms || [];
          if (!gyms.length) {
            showLoadError(
              'Nenhuma academia configurada no sistema. Entre em contato com o suporte.'
            );
            document.getElementById('btnSubmit').disabled = true;
            return;
          }
          gymMultipleWrap.classList.add('d-none');
          gymIdFixed.value = '';
          if (gyms.length === 1) {
            gymIdFixed.value = String(gyms[0].id);
          } else {
            gymSelect.innerHTML = gyms
              .map((g) => `<option value="${g.id}">${g.name}</option>`)
              .join('');
            gymMultipleWrap.classList.remove('d-none');
          }
          document.getElementById('btnSubmit').disabled = false;
        } catch (err) {
          showLoadError(
            'Não foi possível carregar os dados. Verifique se a API e o banco estão no ar.'
          );
          document.getElementById('btnSubmit').disabled = true;
        }
      }

      setupGyms();

      function resolveGymId() {
        if (!gymMultipleWrap.classList.contains('d-none')) {
          return parseInt(gymSelect.value, 10);
        }
        return parseInt(gymIdFixed.value, 10);
      }

      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        alertEl.classList.add('d-none');
        const gym_id = resolveGymId();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!gym_id || Number.isNaN(gym_id)) {
          showLoadError('Não foi possível identificar a academia. Recarregue a página.');
          return;
        }
        try {
          const data = await apiJson('/auth/register', {
            method: 'POST',
            body: { gym_id, email, password },
          });
          alertEl.className = 'alert alert-success';
          alertEl.textContent = data.message || 'Cadastro criado.';
          alertEl.classList.remove('d-none');
          document.getElementById('form').reset();
          await setupGyms();
        } catch (err) {
          alertEl.className = 'alert alert-danger';
          alertEl.textContent = err.message || 'Erro ao cadastrar';
          alertEl.classList.remove('d-none');
        }
      });
    </script>
  </body>
</html>
