<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro — Academia MVP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #eef1f5;
      }
      .auth-card {
        max-width: 460px;
        border: 0;
        border-radius: 12px;
      }
      .auth-card .form-control,
      .auth-card .form-select {
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
      <div class="w-100" style="max-width: 520px">
        <form id="form" class="card shadow-sm auth-card mx-auto">
          <div class="card-body p-4">
            <h1 class="h3 text-center mb-1">Criar Conta de Aluno</h1>
            <p class="text-center text-secondary small mb-4">Seu cadastro ficará pendente até aprovação do owner</p>
            <div id="alert" class="alert d-none" role="alert"></div>
            <div class="mb-3">
              <label class="form-label" for="gym_id">Academia</label>
              <select class="form-select" id="gym_id" required></select>
            </div>
            <div class="mb-3">
              <label class="form-label" for="email">E-mail</label>
              <input class="form-control" type="email" id="email" required autocomplete="username" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Senha (mín. 6 caracteres)</label>
              <input
                class="form-control"
                type="password"
                id="password"
                minlength="6"
                required
                autocomplete="new-password"
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar cadastro</button>
            <p class="text-center text-secondary mt-3 mb-0 small">
              Já possui conta?
              <a href="login.html" class="text-decoration-none fw-semibold">Entrar</a>
            </p>
          </div>
        </form>
        <p class="text-center mt-3 mb-0 small">
          <a href="index.html" class="text-decoration-none">Voltar ao início</a>
        </p>
      </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script>
      const alertEl = document.getElementById('alert');
      const gymSelect = document.getElementById('gym_id');

      (async function loadGyms() {
        try {
          const data = await apiJson('/gyms');
          gymSelect.innerHTML =
            '<option value="">Selecione…</option>' +
            data.gyms.map((g) => `<option value="${g.id}">${g.name}</option>`).join('');
        } catch (err) {
          alertEl.className = 'alert alert-danger';
          alertEl.textContent =
            'Não foi possível carregar as academias. Verifique se a API e o banco estão no ar.';
          alertEl.classList.remove('d-none');
        }
      })();

      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        alertEl.classList.add('d-none');
        const gym_id = parseInt(gymSelect.value, 10);
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
          const data = await apiJson('/auth/register', {
            method: 'POST',
            body: { gym_id, email, password },
          });
          alertEl.className = 'alert alert-success';
          alertEl.textContent = data.message || 'Cadastro criado.';
          alertEl.classList.remove('d-none');
          document.getElementById('form').reset();
          gymSelect.innerHTML = '<option value="">Selecione…</option>';
          const gyms = await apiJson('/gyms');
          gymSelect.innerHTML +=
            gyms.gyms.map((g) => `<option value="${g.id}">${g.name}</option>`).join('');
        } catch (err) {
          alertEl.className = 'alert alert-danger';
          alertEl.textContent = err.message || 'Erro ao cadastrar';
          alertEl.classList.remove('d-none');
        }
      });
    </script>
  </body>
</html>
