<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar — Academia MVP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #eef1f5;
      }
      .auth-card {
        max-width: 420px;
        border: 0;
        border-radius: 12px;
      }
      .auth-card .form-control {
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
      <div class="w-100" style="max-width: 460px">
        <form id="form" class="card shadow-sm auth-card mx-auto">
          <div class="card-body p-4">
            <h1 class="h3 text-center mb-1">Sistema Acadêmico</h1>
            <p class="text-center text-secondary small mb-4">Faça login para continuar</p>
            <div id="alert" class="alert alert-danger d-none" role="alert"></div>
            <div class="mb-3">
              <label class="form-label" for="email">E-mail</label>
              <input class="form-control" type="email" id="email" required autocomplete="username" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Senha</label>
              <input
                class="form-control"
                type="password"
                id="password"
                required
                autocomplete="current-password"
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
            <p class="text-center text-secondary mt-3 mb-0 small">
              Ainda não tem conta?
              <a href="register.html" class="text-decoration-none fw-semibold">Cadastre-se aqui</a>
            </p>
          </div>
        </form>
        <p class="text-center text-muted mt-3 mb-0 small">
          Dica: para painel Owner, use <strong>owner@gymapp.local</strong>
        </p>
      </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script>
      (async function () {
        try {
          const me = await getMe();
          if (me.user.role === 'owner') {
            window.location.href = 'owner.html';
            return;
          }
          window.location.href = 'member.html';
        } catch {
          /* não logado */
        }
      })();

      const alertEl = document.getElementById('alert');
      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        alertEl.classList.add('d-none');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
          const data = await apiJson('/auth/login', {
            method: 'POST',
            body: { email, password },
          });
          if (data.user.role === 'owner') {
            window.location.href = 'owner.html';
          } else {
            window.location.href = 'member.html';
          }
        } catch (err) {
          alertEl.textContent = err.message || 'Falha no login';
          alertEl.classList.remove('d-none');
        }
      });
    </script>
  </body>
</html>
