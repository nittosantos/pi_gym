<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar — Academia Ge Ribeiro</title>
    <link rel="icon" href="assets/branding/geribeiro/geribeiro.png" type="image/png" sizes="any" />
    <link rel="apple-touch-icon" href="assets/branding/geribeiro/geribeiro.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="assets/css/theme-auth.css" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center py-4 auth-wrap"
    >
      <div class="w-100 auth-shell">
        <div class="auth-brand">
          <a href="index.html">
            <img src="assets/branding/geribeiro/geribeiro.png" alt="Academia Ge Ribeiro" />
          </a>
          <div class="auth-brand-title">Academia Ge Ribeiro</div>
        </div>
        <form id="form" class="card auth-card mx-auto shadow-none">
          <div class="card-body p-4">
            <h1 class="h3 text-center mb-1">Entrar</h1>
            <p class="text-center text-secondary small mb-4">Faça login para continuar</p>
            <div id="alert" class="alert alert-danger d-none" role="alert"></div>
            <div class="mb-3">
              <label class="form-label" for="email">E-mail</label>
              <input class="form-control" type="email" id="email" required autocomplete="username" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Senha</label>
              <input
                class="form-control"
                type="password"
                id="password"
                required
                autocomplete="current-password"
              />
            </div>
            <button type="submit" class="btn btn-auth-primary w-100">Entrar</button>
            <p class="text-center text-secondary mt-3 mb-0 small">
              Ainda não tem conta?
              <a href="register.html" class="text-decoration-none fw-semibold">Cadastre-se aqui</a>
            </p>
          </div>
        </form>
        <p class="text-center auth-footer-note mt-3 mb-0">
          Dica (demo): painel do dono — <strong>owner@gymapp.local</strong>
        </p>
      </div>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
